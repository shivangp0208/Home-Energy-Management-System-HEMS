      - "spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/auth/**"

      # ---- Route 2 ----
      - "spring.cloud.gateway.server.webflux.routes[2].id=vpp-service-route"
      - "spring.cloud.gateway.server.webflux.routes[2].uri=http://virtual-power-plant:8087"
