#version: '3.8'
services: 
  postgres-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: HEMS
      POSTGRES_PASSWORD: Hems#Einfochips
    ports:
      - "5432:5432"
    volumes:
      - ./db/pq_init.sql:/docker-entrypoint-initdb.d/init.sql
    platform: linux/amd64

  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Hems#Einfochips
    ports:
      - "3306:3306"
    volumes:
      - ./db/mysql_init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/quartz.sql:/docker-entrypoint-initdb.d/02-quartz.sql
    platform: linux/amd64

  apache-kafka:
    image: apache/kafka:4.2.0
    environment:  
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://apache-kafka:9092,CONTROLLER://apache-kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://apache-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@apache-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
      - "9093:9093"

  rabbitmq-service:
    image: rabbitmq:3.12-management
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: Hems#Einfochips
    ports:
      - "5672:5672"
      - "15672:15672"   # UI dashboard (add this)
    platform: linux/amd64

  redis-hems:
    image: redis:8.6.1-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    platform: linux/amd64

  service-registry-hems:
    image: hemseinfochips/service-registry-hems:latest
    ports:
      - "8091:8091"
    environment:
      - "server.port=8091"
      - "eureka.client.register-with-eureka=false"
      - "eureka.client.fetch-registry=false"
      - "logging.level.com.netflix.eureka=off"
      - "logging.level.com.netflix.discovery=off"
    platform: linux/amd64

  api-gateway-hems:
    depends_on:
      - service-registry-hems
      - postgres-db
      - rabbitmq-service
    image: hemseinfochips/api-gateway-hems:latest
    ports:
      - "8090:8090"
    environment:
      - "spring.application.name=api-gateway-hems"
      - "spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-0x5bg1uy1egiz4y0.us.auth0.com/"
