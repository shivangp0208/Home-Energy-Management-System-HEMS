      - "spring.security.oauth2.client.registration.auth0.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}"
      - "spring.security.oauth2.client.registration.auth0.client-id=esYKYGPnPt7qvkn8gZ7Qt1WI4IcNkEx8"
      - "spring.security.oauth2.client.registration.auth0.client-secret=nK_uGuf6T9XwPuN2OO8VUbP21UMVDauYk9g35d8ojuydvUcWtbclE4Y-mHLXuiyS"
      - "spring.security.oauth2.client.registration.auth0.authorization-grant-type=authorization_code"
      - "spring.security.oauth2.client.registration.auth0.scope=openid,profile,email,offline_access"
      - "spring.security.oauth2.client.provider.auth0.issuer-uri=https://dev-0x5bg1uy1egiz4y0.us.auth0.com/"
      - "spring.cloud.config.import-check.enabled=false"
      - "spring.cloud.gateway.server.webflux.default-filters=TokenRelay"
      # ---- Route 0 ----
      - "spring.cloud.gateway.server.webflux.routes[0].id=site-service-route"
      - "spring.cloud.gateway.server.webflux.routes[0].uri=http://site-service:8086"
      - "spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/owner/**,/api/v1/site/**,/check-token-is-present/**"

      # ---- Route 1 ----
