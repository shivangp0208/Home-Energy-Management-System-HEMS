spring:
  application:
    name: auth-service-hems

  security:
    oauth2:
      client:
        registration:
          auth0:
            client-id: 
            client-secret: 
            scope:
              - openid
              - profile
              - email
              - offline_access

        provider:
          auth0:
            issuer-uri: https://dev-0x5bg1uy1egiz4y0.us.auth0.com/

      resourceserver:
        jwt:
          issuer-uri: https://dev-0x5bg1uy1egiz4y0.us.auth0.com/
          audiences:
            - https://api.mfa01.com

  datasource:
    url: 
    username: 
    password: 

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  main:
    allow-bean-definition-overriding: true
    
  data:
    redis:
      host: localhost
      port: 6379

  config:
    import: optional:configserver:http://localhost:8095

server:
  port: 8082