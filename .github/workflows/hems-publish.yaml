name: HEMS Microservices Build and Publish

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build-and-push:
runs-on: ubuntu-latest


strategy:
  fail-fast: false
  max-parallel: 2   # 🔥 IMPORTANT: prevents rate limit
  matrix:
    service:
      - admin-service
      - api-gateway-hems
      - auth-service-hems
      - chatbot-service
      - dispatch-manager-service
      - email-service
      - envoy-manager-service
      - program-enrollment-manager
      - service-registry-hems
      - simulator-service
      - site-manager-service
      - virtual-power-plant
      - vpp-manager
      - ai_module
      - excel-module

steps:
  # ✅ Checkout
  - name: Checkout Code
    uses: actions/checkout@v4

  # ✅ Java setup (with cache)
  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'
      cache: 'gradle'

  # ✅ Permission fix
  - name: Grant execute permission for gradlew
    run: chmod +x gradlew

  # ✅ Build only required module
  - name: Build ${{ matrix.service }}
    run: ./gradlew :${{ matrix.service }}:build -x test

  # ✅ Docker Buildx
  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  # ✅ Login Docker Hub (avoids rate limit)
  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_TOKEN }}

  # ✅ Login GHCR (backup registry)
  - name: Login to GHCR
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  # 🔥 CRITICAL: Pre-pull base image (reduces rate-limit hits)
  - name: Pre-pull base image
    run: docker pull ghcr.io/adoptium/temurin:17-jre-alpine

  # 🚀 Build & Push with cache
  - name: Build and push ${{ matrix.service }}
    uses: docker/build-push-action@v5
    with:
      context: ./${{ matrix.service }}
      file: ./${{ matrix.service }}/Dockerfile
      push: true
      tags: |
        ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
        ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
        ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
      cache-from: type=gha
      cache-to: type=gha,mode=max

