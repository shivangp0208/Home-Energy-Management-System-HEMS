name: HEMS Microservices Build and Publish

on:
#  uncomment this to start the github action automatically, I have disabled this to limit the pipeline
#  push:
#    branches:
#      - main
#  this is alternate button which can trigger the pipeline manually
  workflow_dispatch:
    inputs:
      service:
        # to run pipeline for a single service or selected service then name that service with comma seperated to run for all just write 'all' 
        description: 'site-manager-service'
        required: true
        default: 'all'  

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    if: |
      github.event.inputs.service == 'all' ||
      contains(format(',{0},', github.event.inputs.service), format(',{0},', matrix.service))  

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        service:
          - admin-service
          - api-gateway-hems
          - auth-service-hems
          - chatbot-service
          - dispatch-manager-service
          - email-service
          - envoy-manager-service
          - program-enrollment-manager
          - service-registry-hems
          - simulator-service
          - site-manager-service
          - virtual-power-plant
          - vpp-manager
          - ai_module
          - excel-module

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java Setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Permission fix
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Build module
      - name: Build ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:build -x test

      # 5. Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Docker Hub Login (Required so you can PUSH your finished images)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 7. Build & Push
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max