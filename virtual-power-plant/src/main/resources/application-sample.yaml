spring:
  application:
    name: Virtual-Power-Plant

  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
    username: 
    password: 
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
      connection-timeout: 60000
      max-lifetime: 240000
      idle-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    producer:
      bootstrap-servers:
        - localhost:9092
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer


    consumer:
      bootstrap-servers:
        - localhost:9092
      enable-auto-commit: false
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.project.hems.hems_api_contracts.contract.simulator
        spring.json.value.default.type: com.project.hems.hems_api_contracts.contract.simulator.MeterSnapshot


    listener:
      ack-mode: MANUAL
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-0x5bg1uy1egiz4y0.us.auth0.com/

  rabbitmq:
    host: localhost
    port: 5672
    username: 
    password: 

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  quartz:
    job-store-type: JDBC
    jdbc:
      initialize-schema: NEVER

    properties:
      org:
        quartz:
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
          threadPool:
            threadCount: 5
            
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8091/eureka

server:
  port: 8086

property:
  config:
    kafka:
      raw-energy-group-id: raw-energy-readers-vpp
      raw-energy-topic: RAW_ENERGY_READINGS
      raw-energy-partition-count: 3

      vpp-service-group-id: vpp-requirement-group
      vpp-service-topic: VPP-REQUIREMENT
      vpp-service-partition-count: 3

      vpp-service-dlt-group-id: vpp-requirement-dlt-group
      vpp-service-dlt-topic: VPP-REQUIREMENT.DLT

      dispatch-event-group-id: dispatch-event-readers
      dispatch-event-topic: ENERGY_DISPATCH_EVENTS
      dispatch-event-partition-count: 1

      vpp-snapshots-topic: VPP_ENERGY_SNAPSHOTS
      vpp-snapshots-partitions: 3
      replica-count: 1

logging:
  level:
    '[com.project.hems.envoy_manager_service]': debug

supabase:
  url: https://ggrwtqtkmtmhpntdwrkx.supabase.co
  key: 
  bucket: vpp_images

kafka:
  topic:
    schedule-topic: dispatch-topic

