spring:
  application:
    name: ADMIN-SERVICE


  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-0x5bg1uy1egiz4y0.us.auth0.com/
          audiences:
            - https://api.mfa01.com
  datasource:
    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?prepareThreshold=0
    username: postgres.wtnlrjlflakeivcrsgfx
    password: Hems#Einfochips
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
      connection-timeout: 60000
      max-lifetime: 240000
      idle-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    producer:
      bootstrap-servers:
        - localhost:9092
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer


  config:
    import: "optional:configserver:http://localhost:8095"
  quartz:
    job-store-type: JDBC
    jdbc:
      initialize-schema: NEVER

    properties:
      org:
        quartz:
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
          threadPool:
            threadCount: 5

  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: Hems#Einfochips


eureka:
  instance:
    prefer-ip-address: true
    ip-address: 192.168.232.148
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8091/eureka

server:
  port: 8093


property:
  config:
    schedule-topic-group-id: dispatch-topic-reader
    schedule-topic: dispatch-topic
    schedule-topic-partition-count: 3

    replica-count: 1

