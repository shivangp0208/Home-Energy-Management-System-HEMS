spring:
  datasource:
#    url: jdbc:mysql://hems-auth.czkgccwqed1c.ap-south-1.rds.amazonaws.com:3306/site_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#    username: 
#    password: 
    url: jdbc:mysql://localhost:3306/site_service
    username: 
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  main:
    allow-bean-definition-overriding: true

  application:
    name: site-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-0x5bg1uy1egiz4y0.us.auth0.com/
          scope:
            - email
  kafka:
    producer:
      bootstrap-servers:
        - localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  config:
    import: optional:configserver:http://localhost:8095

  rabbitmq:
    host: localhost
    port: 5672
    username: 
    password: 

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8091/eureka

server:
  port: 8081

property:
  config:
    kafka:
      site-creation-dlt-group-id: site-creation-dlt-reader
      site-creation-dlt-topic: SITE_CREATION_DETAILS.DLT

      site-creation-group-id: site-creation-reader
      site-creation-topic: SITE_CREATION_DETAILS
      site-creation-partition-count: 1
      replica-count: 1

logging:
  level:
    '[com.project.hems.SiteManagerService]': debug