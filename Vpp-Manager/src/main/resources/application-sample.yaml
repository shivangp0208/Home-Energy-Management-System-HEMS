spring:
  application:
    name: Vpp-Manager


  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: vpp-manager-group
      enable-auto-commit: false
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.project.hems.hems_api_contracts.contract.vpp.*;
        spring.json.value.default.type: com.project.hems.hems_api_contracts.contract.vpp.VppSnapshot




    listener:
      ack-mode: MANUAL

  config:
    import: optional:configserver:http://localhost:8095

property:
  kafka:
    vpp-snapshots-topic: VPP_ENERGY_SNAPSHOTS





server:
  port: 8087