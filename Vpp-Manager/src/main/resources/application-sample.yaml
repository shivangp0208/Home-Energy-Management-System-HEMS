spring:
  application:
    name: Vpp-Manager


  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: vpp-manager-group
      enable-auto-commit: false
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.project.hems.hems_api_contracts.contract.vpp.*;
        spring.json.value.default.type: com.project.hems.hems_api_contracts.contract.vpp.VppSnapshot




    listener:
      ack-mode: MANUAL

property:
  kafka:
    vpp-snapshots-topic: VPP_ENERGY_SNAPSHOTS


eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8091/eureka
  instance:
    prefer-ip-address: true



server:
  port: 8087