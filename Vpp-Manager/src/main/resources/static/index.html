<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h2>Live VPP Data</h2>
<pre id="output"></pre>

<script>
  const socket = new SockJS("http://localhost:8087/ws");
  const stompClient = Stomp.over(socket);

  const vppSnapshots = {}; // store by vppId

  stompClient.connect({}, function () {
    stompClient.subscribe("/topic/meter", function (message) {
      const data = JSON.parse(message.body);

      const id = data.vppId;   // ✅ important fix
      if (!id) {
        console.warn("Missing vppId in message:", data);
        return;
      }

      vppSnapshots[id] = data;
      render();
    });
  });

  function render() {
    const output = document.getElementById("output");
    output.textContent = "";

    Object.keys(vppSnapshots).forEach((id) => {
      output.textContent +=
        "VPP " + id + ":\n" +
        JSON.stringify(vppSnapshots[id], null, 2) +
        "\n\n------------------------\n\n";
    });
  }
</script>
</body>
</html>
